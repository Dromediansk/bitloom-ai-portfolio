<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#4d93fc"/>
    </linearGradient>
  </defs>
  <!-- Gray background -->
  <rect width="160" height="160" rx="0" fill="#0f172a"/>
  <!-- Dark square -->
  <rect x="24" y="24" width="80" height="80" rx="16" fill="none" stroke="#0d6efd" stroke-width="6"/>
  <!-- Light square -->
  <rect x="56" y="56" width="80" height="80" rx="16" fill="none" stroke="#4d93fc" stroke-width="6"/>
  <!-- Weave: dark over light at left edge of light square -->
  <line x1="56" y1="86" x2="56" y2="104" stroke="#0d6efd" stroke-width="6" stroke-linecap="round"/>
  <!-- Weave: dark over light at top edge of light square -->
  <line x1="86" y1="56" x2="104" y2="56" stroke="#0d6efd" stroke-width="6" stroke-linecap="round"/>
  <!-- Center node -->
  <circle cx="80" cy="80" r="4" fill="url(#node-grad)"/>
</svg>
